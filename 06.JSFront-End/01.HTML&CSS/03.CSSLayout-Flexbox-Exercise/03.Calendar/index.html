<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
    <div class="wrapper">
        <section class="days main">
            <section class="day-type"><p>Workweek</p></section>

            <div class="dates">
                <section class="date"><p>1 Monday</p></section>
                <section class="date"><p>2 Tuesday</p></section>
                <section class="date"><p>3 Wednesday</p></section>
                <section class="date"><p>4 Thursday</p></section>
                <section class="date"><p>5 Friday</p></section>
            </div>


            <section class="day-type"><p>Weekend</p></section>

            <div class="dates">
                <section class="date"><p>6 Saturday</p></section>
                <section class="date"><p>7 Sunday</p></section>
            </div>
        </section>

        <section class="actions main">
            <div class="action"><p>Reminders</p></div>
            <div class="action"><p>Special Dates</p></div>
        </section>
    </div>
    </main>
</body>
</html>
