<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="keyboard">
        <section class="row row-1">
            <div class="key regular">esc</div>
            <div class="key regular">f1</div>
            <div class="key regular">f2</div>
            <div class="key regular">f3</div>
            <div class="key regular">f4</div>
            <div class="key regular">f5</div>
            <div class="key regular">f6</div>
            <div class="key regular">f7</div>
            <div class="key regular">f8</div>
            <div class="key regular">f9</div>
            <div class="key regular">f10</div>
            <div class="key regular">f11</div>
            <div class="key regular">f12</div>
            <div class="key regular">f13</div>
        </section>

        <section class="row row-2">
            <div class="key regular">`</div>
            <div class="key regular">1</div>
            <div class="key regular">2</div>
            <div class="key regular">3</div>
            <div class="key regular">4</div>
            <div class="key regular">5</div>
            <div class="key regular">6</div>
            <div class="key regular">7</div>
            <div class="key regular">8</div>
            <div class="key regular">9</div>
            <div class="key regular">0</div>
            <div class="key regular">-</div>
            <div class="key regular">+</div>
            <div class="key bigger">backspace</div>
        </section>

        <section class="row row-3">
            <div class="key bigger">tab</div>
            <div class="key regular">q</div>
            <div class="key regular">w</div>
            <div class="key regular">e</div>
            <div class="key regular">r</div>
            <div class="key regular">t</div>
            <div class="key regular">y</div>
            <div class="key regular">u</div>
            <div class="key regular">i</div>
            <div class="key regular">o</div>
            <div class="key regular">p</div>
            <div class="key regular">[</div>
            <div class="key regular">]</div>
            <div class="key bigger enter-key regular">enter</div>
        </section>

        <section class="row row-4">
            <div class="key bigger">caps lock</div>
            <div class="key regular">a</div>
            <div class="key regular">s</div>
            <div class="key regular">d</div>
            <div class="key regular">f</div>
            <div class="key regular">g</div>
            <div class="key regular">h</div>
            <div class="key regular">j</div>
            <div class="key regular">k</div>
            <div class="key regular">l</div>
            <div class="key regular">;</div>
            <div class="key regular">'</div>
            <div class="key regular">\</div>
            <div class="key enter-bellow"></div>
        </section>

        <section class="row row-5">
            <div class="key bigger">shift</div>
            <div class="key regular">§</div>
            <div class="key regular">z</div>
            <div class="key regular">x</div>
            <div class="key regular">c</div>
            <div class="key regular">v</div>
            <div class="key regular">b</div>
            <div class="key regular">n</div>
            <div class="key regular">m</div>
            <div class="key regular">,</div>
            <div class="key regular">.</div>
            <div class="key regular">/</div>
            <div class="key bigger">shift</div>
        </section>

        <section class="row row-6">
            <div class="key regular">ctrl</div>
            <div class="key regular">win</div>
            <div class="key regular">alt</div>
            <div class="key regular" id="space"></div>
            <div class="key regular">alt</div>
            <div class="key regular">win</div>
            <div class="key regular">ctrl</div>
        </section>

        <section class="enter">
            <div class="upper">enter</div>
            <div class="lower"></div>
        </section>
    </div>
</body>
</html>
