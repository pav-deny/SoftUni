<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="" class="registrate-form">
        <fieldset class="registrate">
            <legend class="registrate-text">Registration</legend>

            <fieldset class="login-info secondary">
                <legend>Login Information</legend>

                 <p class="email-ctr ctr">
                <label for="email">Email</label>    
                <input type="email" id="email" required>
                <span>example: denypavlov2010@gmail.com</span>
            </p>

            <p class="password-ctr ctr">
                <label for="password">Password</label>  
                <input type="password" id="password" required>
                <span>minimum 6 characters, letters and numbers, at least 1 special character</span>
            </p>
            </fieldset>

            <fieldset class="additional-info secondary">
                <legend >Additional Information</legend>

                <label for="birth-date">Date of Birth</label>
                <input type="date" id="birth-date">
                <span>example: 08.03.2010</span>
            </fieldset>

            <button class="registrate-btn">Login</button>
        </fieldset>
    </form>
</body>
</html>
