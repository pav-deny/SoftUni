<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 01</title>
</head>
<body>
    <h1>Forms</h1>

     <form action="" method="">
        Username <input type="text" id="username" placeholder="Type username here..."> 
       <br>
        Password <input type="password"> <br>
        Email <input type="email"> <br>
        You cant write here <input type="text" readonly value="nope"> <br>
        Range <input type="range" step="10" minlength="0" maxlength="100" value="20"> <br>
        <br>
        Date <input type="date"> <br>
        Image <input type="image"> <br>
        File <input type="file"> <br>
        <br>
        Gender <br>
        <input type="radio" id="gender-male" name="gender-select">
        <label for="gender-male">Male</label>
        <br>
        <input type="radio" id="gender-female" name="gender-select">
        <label for="gender-female">Female</label>
        <br>
        <input type="radio" id="gender-other" name="gender-select">
        <label for="gender-other">Other</label>

        <br>
        <br>

        Pizza time! Pick an addition to your order: <br>
        <input type="checkbox" id="soda">
        <label for="soda">Soda</label>
        <br>
        <input type="checkbox" id="sauce">
        <label for="sauce">Sauce</label>
        <br>
        <input type="checkbox" id="dessert">
        <label for="dessert">Dessert</label> <br>

        <br>
        Gender time again! <br>
        <select name="" id="">
            <option value="" selected disabled>--Choose your gender--</option>
            <option value="">Male</option>
            <option value="">Female</option>
            <option value="">Other</option>
            <option value=""></option>
        </select>

        <br>
        <br>

         Gender time again! <br>
        <select name="" id="" multiple>
            <option value="" selected disabled>--Choose your gender--</option>
            <option value="">Male</option>
            <option value="">Female</option>
            <option value="">Other</option>
            <option value=""></option>
        </select>

        <br>
        <br>

        <textarea name="" id="" placeholder="Type text here..."></textarea> <br> <br>

        <input type="button" value="Type 1">
        <button type="button">Type 2</button>
        <br>

        <br>
        <fieldset>
            <legend>Info for the product</legend>
            <section>
                <p>Hi</p>
                <p>My name is</p>
                <p>What?</p>
            </section>
        </fieldset>
        <br>

        <input type="number" min="0" value="1">
        <br>
        <br>

        Telephone <input type="tel"> <br>
        Search <input type="search"> <br>
        Time <input type="time"> <br>
        <br>

        Week <input type="week"> <br>
        Month <input type="month"> <br>

        <br>
        <button>Submit</button>
    </form>
</body>
</html>
