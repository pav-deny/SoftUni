<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Typography</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="table">
        <div class="table-info">
            <h2>Table Title</h2>
        </div>

        <div class="content row1">
            <h3 class="item">Title 1</h3>
            <h3 class="item">Title 2 is fairly long</h3>
            <h3 class="item">Title 3</h3>
        </div>
        <div class="content row2 values">
            <p class="item item-1">Value 1</p>
            <p class="item item-2">Value 2</p>
            <p class="item item-3">Value 3</p>
        </div>
        
        <div class="content row3 values">
            <p class="item item-1">Value 1</p>
            <p class="item item-2">Value 2</p>
            <p class="item item-3">Value 3</p>
        </div>

        <div class="content row4 values">
             <p class="item item-1">Value 1</p>
            <p class="item item-2">Value 2</p>
            <p class="item item-3">Value 3</p>
        </div>
    </div>
</body>
</html>
