<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Tables</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <div class="table-card tc-1">
     <h2>Table Title</h2>
    <table>
        <thead>
            <tr>
                <th>Title 1</th>
                <th>Title 2 is fairly long</th>
                <th>Title 3</th>
            </tr>
        </thead>
        <tbody>
            <tr class="t1">
            <th class="t1-i1 t1-i1-1">Value 1</th>
            <th class="t1-i2">Value 2</th>
            <th class="t1-i3">Value 3</th>
        </tr>

         <tr>
            <th class="t1-i1">Value 1</th>
            <th class="t1-i2">Value 2</th>
            <th class="t1-i3">Value 3</th>
        </tr>

         <tr class="t2-3">
            <th class="t1-i1">Value 1</th>
            <th class="t1-i2">Value 2</th>
            <th class="t1-i3">Value 3</th>
        </tr>
        </tbody>
    </table>
   </div>

   <div class="table-card tc-2">
        <table>
            <thead>
                <tr>
                    <th>Header 1</th>
                    <th>Header 22</th>
                    <th>Header 333</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <th class="t2-i1 t1-i1-1">Row 1, Col 1</th>
                    <th class="t2-i2">Row 1, Col 2</th>
                    <th class="t2-i3">Row 1, Col 3</th>
                </tr>

                <tr>
                    <th class="t2-i1">Row 2, Col 1</th>
                    <th class="t2-i2">Row 2, Col 2</th>
                    <th class="t2-i3">Row 2, Col 3</th>
                </tr>

                <tr class="t2-3">
                    <th class="t2-i1">Row 3, Col 1</th>
                    <th class="t2-i2">Row 3, Col 2</th>
                    <th class="t2-i3">Row 3, Col 3</th>
                </tr>
            </tbody>
        </table>
   </div>
</body>
</html>
