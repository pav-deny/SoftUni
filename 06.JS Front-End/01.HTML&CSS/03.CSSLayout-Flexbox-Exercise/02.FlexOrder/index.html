<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Order</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="site-layout right-sidebar">
        <header class="normal box-layout"><p>Header</p></header>

        <div class="main-and-sidebar">
            <main class="box-layout"><p>Main content</p></main>
            <aside class="box-layout"><p>Sidebar</p></aside>
        </div>

        <footer class="normal box-layout"><p>Site footer</p></footer>
    </section>

    <section class="site-layout left-sidebar">
        <header class="normal box-layout"><p>Header</p></header>

        <div class="main-and-sidebar">
            <main class="box-layout"><p>Main content</p></main>
            <aside class="box-layout"><p>Sidebar</p></aside>
        </div>

        <footer class="normal box-layout"><p>Site footer</p></footer>
    </section>
</body>
</html>
